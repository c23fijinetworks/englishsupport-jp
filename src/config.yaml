site:
  name: English Support
  site: 'https://englishsupport.jp'
  base: '/'
  trailingSlash: false

  googleSiteVerificationId: googlesiteverificationid

# Default SEO metadata
metadata:
  title:
    default: "Hanei English Inbound Digital | High-Visibility English Marketing Hubs for Local Business"
    template: '%s — English Support'
  description: "Attract English-speaking customers with English Support. We build high-visibility English digital inbound marketing hubs designed to grow your local business."
  robots:
    index: true
    follow: true
  openGraph:
    site_name: English Support
    images:
      - url: '~/assets/images/default.png'
        width: 1200
        height: 628
    type: website
  twitter:
    handle: '@haneiinbound'
    site: '@haneiinbound'
    cardType: summary_large_image

i18n:
  language: en
  textDirection: ltr

apps:
  blog:
    isEnabled: false
    postsPerPage: 6
    post: { isEnabled: true, permalink: '/%slug%', robots: { index: true } }
    list: { isEnabled: false, pathname: 'blog', robots: { index: true } }
    category: { isEnabled: false, pathname: 'category', robots: { index: true } }
    tag: { isEnabled: false, pathname: 'tag', robots: { index: false } }
    isRelatedPostsEnabled: false
    relatedPostsCount: 4

analytics:
  vendors:
    googleAnalytics: { id: null }

ui:
  theme: 'light:only'
